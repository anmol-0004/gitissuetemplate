name: "🚀 New App Onboarding"
description: "Request to onboard a new application to FSAC"
title: "ONBOARD: [App Name]"
labels: ["onboarding", "type: infra"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        # New App Onboarding Request
        Complete all fields below.

  - type: input
    id: app_name
    attributes:
      label: "App Name"
      placeholder: "my-app"
      description: "e.g., analytics-pipeline"
    validations:
      required: true

  - type: input
    id: team_name
    attributes:
      label: "Team Name"
      placeholder: "Backend Team"
      description: "Which team owns this app?"
    validations:
      required: true

  - type: input
    id: tech_stack
    attributes:
      label: "Tech Stack"
      placeholder: "Python / FastAPI"
      description: "e.g., Python, Go, Java, Node.js"
    validations:
      required: true

  - type: input
    id: expected_traffic
    attributes:
      label: "Expected Traffic & Resources"
      placeholder: "200 RPS, 8 GB memory"
      description: "CPU, memory, requests per second"
    validations:
      required: true

  - type: input
    id: contact
    attributes:
      label: "On-Call Contact"
      placeholder: "john@company.com"
      description: "Team member responsible for this app"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Onboarding Checklist
        Platform team will complete these items:

  - type: checkboxes
    id: checklist
    attributes:
      label: "Onboarding Tasks"
      options:
        - label: "ONBOARD: Namespace creation + quota"
        - label: "ONBOARD: RBAC setup + AAD group"
        - label: "ONBOARD: Network policy + Istio"
        - label: "ONBOARD: Ingress + DNS"
        - label: "ONBOARD: Sealed Secrets"
        - label: "ONBOARD: ArgoCD Application"
        - label: "ONBOARD: ServiceMonitor + Grafana"
        - label: "ONBOARD: Log aggregation"
        - label: "ONBOARD: Backup policy"
        - label: "ONBOARD: Cost allocation labels"
        - label: "ONBOARD: Documentation"
        - label: "ONBOARD: Production sign-off"
